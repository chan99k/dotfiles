# agentic-team — tmux 키 바인딩
#
# 본 명세 SPEC.md §8 의 키 바인딩(prefix + R) 정의.
# 사용자 ~/.tmux.conf 에 다음 한 줄 추가:
#
#   source-file ~/.claude/agentic-team/tmux/keybinding.conf
#
# 또는 본 라인을 .tmux.conf 에 직접 박아도 동등:
#
#   bind-key R run-shell "~/.claude/agentic-team/bin/team-layout"
#
# 적용:
#   prefix + : 후 `source-file ~/.tmux.conf` 또는 tmux 재시작.
#
# 사용:
#   prefix + R   현재 윈도우를 3-pane (PM | Gemini / Codex) 로 분할.
#                pane 안 단축키: q=quit / space=pause / l=less raw log

bind-key R run-shell "~/.claude/agentic-team/bin/team-layout"
